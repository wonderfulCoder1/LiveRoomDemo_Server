daemon off;

error_log /dev/stdout info;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application video {
                play /yjdata/www/www/video;
        }
        application live {
                live on;
                hls on;
                hls_path /yjdata/www/www/live/hls/;
                hls_fragment 5s;
        }
    }
}


http {
    root /www/static;
    sendfile off;
    tcp_nopush on;
    server_tokens off;
    access_log /dev/stdout combined;

    # Uncomment these lines to enable SSL.
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;

     server {
            listen       80;
            server_name  localhost;

            #charset koi8-r;
            index index.jsp index.html;
            root /yjdata/www/www;
            #access_log  logs/host.access.log  main;

            location / {
                proxy_pass  http://127.0.0.1:8080;
            }
            location ~ .*\.(gif|jpg|jpeg|png|bmp|swf|js|css|docx|pdf|doc|ppt|html|properties)$ {
                    expires 30d;
                    root /yjdata/www/www/static/;
            }
            location /hls {
                types {
                    application/vnd.apple.mpegurl m3u8;
                    #application/x-mpegURL;
                    video/mp2t ts;
                }
                alias /yjdata/www/www/live/hls/;
                expires -1;
                add_header Cache-Control no-cache;

                # ===== 添加 CORS 头 =====
                # 允许所有域名访问（生产环境建议指定具体域名）
                add_header 'Access-Control-Allow-Origin' '*' always;
                # 允许的请求方法
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                # 允许的请求头
                add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept' always;
                # 预检请求的缓存时间（秒）
                add_header 'Access-Control-Max-Age' 1728000 always;
            }

            location /stat {
                     rtmp_stat all;
                     rtmp_stat_stylesheet stat.xsl;
            }

            location /stat.xsl {
                    root /soft/nginx/nginx-rtmp-module/;
             }
        }
}
